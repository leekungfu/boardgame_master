    sdk: flutter
  flutter_riverpod: ^2.5.1
  uuid: ^4.4.0
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  confetti: ^0.7.0
  phosphor_flutter: ^2.1.0

dev_dependencies:
